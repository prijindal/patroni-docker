on:
  push:
    branches:
      - "*"
  schedule:
    - cron: '0 0 * * *'

name: Docker

permissions:
  contents: read
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true


jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Login to docker
        uses: docker/login-action@v3
        with:
          registry: gitea.prijindal.click
          username: prijindal
          password: ${{ secrets.PACKAGE_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: gitea.prijindal.click/${{ gitea.repository }}:${{ gitea.ref_name }},gitea.prijindal.click/${{ gitea.repository }}:${{ gitea.sha }}
          cache-from: type=registry,ref=gitea.prijindal.click/${{ gitea.repository }}:buildcache
          cache-to: type=registry,ref=gitea.prijindal.click/${{ gitea.repository }}:buildcache,mode=max
